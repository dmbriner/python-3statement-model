## Copy values into `.streamlit/secrets.toml` for local use.
ALPHA_VANTAGE_API_KEY = "your_alpha_vantage_key"
FMP_API_KEY = "your_fmp_key"

[auth.users.admin]
display_name = "Admin"
password = "change_me"
allowed_profiles = ["shared-default"]

[api_profiles.shared-default]
label = "Shared FMP + Alpha"
ALPHA_VANTAGE_API_KEY = "your_alpha_vantage_key"
FMP_API_KEY = "your_fmp_key"
